      canonical_status: canonical
    logic_business_feature:
      source_path: Prompt/API/Gen Script/API_Gen_Script_Logic_Business_Feature.txt
      runtime_prompt: prompts/API/Gen Script/API_Gen_Script_Logic_Business_Feature.txt
