schema_version: '1.0'
source_root: BIDV
runtime_knowledge_root: knowledge/default/redacted
canonical_status_policy:
  default_runtime_statuses:
    - canonical
    - control_source
  excluded_statuses:
    - legacy_reference
    - sensitive_reference

api_test_design:
  canonical_prompts:
    setup_context:
      source_path: Prompt/API/API_TD_1_Setup_Context.txt
      runtime_prompt: prompts/API/API_TD_1_Setup_Context.txt
      canonical_status: canonical
    method_header:
      source_path: Prompt/API/API_TD_2_Method_Header_BreakDown.txt
      runtime_prompt: prompts/API/API_TD_2_Method_Header_BreakDown.txt
      canonical_status: canonical
    schema_validation:
      source_path: Prompt/API/API_TD_3_Schema_Validation_BreakDown.txt
      runtime_prompt: prompts/API/API_TD_3_Schema_Validation_BreakDown.txt
      canonical_status: canonical
    value_business_cross_logic:
      source_path: Prompt/API/API_TD_4_Value_Business_Cross_Logic_BreakDown.txt
      runtime_prompt: prompts/API/API_TD_4_Value_Business_Cross_Logic_BreakDown.txt
      canonical_status: canonical
  control_sources:
    api_new_parameter_guideline:
      source_path: Prompt/API/API_NewParameterGuideline.xlsx
      canonical_status: control_source
      required_controls:
        - METHOD_CHECK
        - CONTENT_TYPE_CHECK
        - MANDATORY_CHECK
        - TYPE_CHECK
        - LENGTH_CHECK
        - SCOPE_FIELDS
        - EG_CHECK

