      canonical_status: canonical
    method_header_feature:
      source_path: Prompt/API/Gen Script/API_Gen_Script_Method_Header_Validation_Feature.txt
      runtime_prompt: prompts/API/Gen Script/API_Gen_Script_Method_Header_Validation_Feature.txt
      canonical_status: canonical
    schema_validation_feature:
      source_path: Prompt/API/Gen Script/API_Gen_Script_Validation_Feature.txt
