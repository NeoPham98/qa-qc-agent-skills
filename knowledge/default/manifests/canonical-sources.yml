templates:
  rsd:
    source_path: template/Template_RSD_AI.doc
    canonical_status: canonical
  rsd_detail:
    source_path: template/Template_RSD_ChiTiet_AI.doc
    canonical_status: canonical
  pttk:
    source_path: template/Template_PTTK_AI.doc
    canonical_status: canonical
  pttk_api_detail:
    source_path: template/Template_PTTK_AI_ChiTiet_API.doc
    canonical_status: canonical

tracker:
  paygates_status:
    source_path: Tổng hợp Trạng Thái Test Case Paygates (1).xlsx
    canonical_status: canonical
    contract: paygates_dashboard

sensitive_sources:
  properties:
    source_path: Prompt/API/Gen Script/properties.txt
    canonical_status: sensitive_reference
    runtime_policy: redact_before_use

legacy_sources:
  old_api_prompts:
    canonical_status: legacy_reference
    source_paths:
      - Prompt/API/[Old]_API_Gen_TD_v1.2.txt
      - Prompt/API/[Old]_API_Gen_TC_From_TD.txt
    runtime_policy: never_default_route
