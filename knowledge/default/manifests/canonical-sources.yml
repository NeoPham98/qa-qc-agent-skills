      source_path: Prompt/UI/UI_Gen_TD.txt
      alternate_source_path: UI/UI_Gen_TD.txt
      runtime_prompt: prompts/UI/UI_Gen_TD.txt
      canonical_status: canonical
  id_policy: '### TD_001 - [Technique] - <condition summary>'

ui_testcase:
  canonical_prompts:
    ui_tc_from_td:
      source_path: Prompt/UI/UI_Gen_TC_From_TD.txt
      alternate_source_path: UI/UI_Gen_TC_From_TD.txt
      runtime_prompt: prompts/UI/UI_Gen_TC_From_TD.txt
      canonical_status: canonical
  output_contracts:
    - legacy_19_column_testcase

uat_testcase:
  canonical_prompts:
    uat_tc:
      source_path: Prompt/UI/UI_Gen_TC_For_UAT.txt
      alternate_source_path: UI/UI_Gen_TC_For_UAT.txt
      runtime_prompt: prompts/UI/UI_Gen_TC_For_UAT.txt
      canonical_status: canonical
