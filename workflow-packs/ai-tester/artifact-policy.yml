schema_version: '1.0'
artifact_root: artifacts/ai-tester
naming_pattern: '{project}/{squad}/{epic}/{layer}/{artifact_type}/{yyyy-mm-dd}/{artifact_id}.{ext}'
states:
  draft:
    directory: artifacts/ai-tester/draft
    writer: cognition_or_output_generator
    approval_required: false
  reviewed:
    directory: artifacts/ai-tester/reviewed
    writer: reviewer
    requires:
      - validation_report
      - OutputReview.md
  approved:
    directory: artifacts/ai-tester/approved
    writer: supervisor
    requires:
      - validation_report
      - OutputReview.md
      - SupervisorApproval.md
      - source_trace
      - no_secret_report
  rejected:
    directory: artifacts/ai-tester/rejected
    writer: supervisor
    requires:
      - failure_reason
  memory_pending:
    directory: artifacts/ai-tester/memory-pending
    writer: reflection_agent
    requires:
      - LessonsLearned.md
      - MemoryUpdate.md
      - approval_status
publish_rules:
  cognition_agent_writes_only: draft
  output_generator_writes_only: draft
  reviewer_pass_moves_to: reviewed
  supervisor_pass_moves_to: approved
  critical_failure_moves_to: rejected
  memory_update_requires_approval: true
  max_retries: 2
  approved_overwrite_policy: forbid_overwrite_use_archive_or_version_suffix
required_cognition_evidence_before_output:
  - SourceInventory.md
  - DocumentMap.md
  - FactInventory.md
  - BusinessRuleModel.md
  - RiskModel.md
  - CoveragePlan.md
  - TesterStrategyPlan.md
  - QuestionBacklog.md
required_approved_evidence:
  - validation_report
  - OutputReview.md
  - SupervisorApproval.md
  - source_trace
  - no_secret_report
