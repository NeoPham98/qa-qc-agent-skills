lifecycle_states:
  draft:
    directory: artifacts/default/draft
    writer: generator
    approval_required: false
  reviewed:
    directory: artifacts/default/reviewed
    writer: reviewer
    requires:
      - validation_report
      - OutputReview.md
  approved:
    directory: artifacts/default/approved
    writer: supervisor
    requires:
      - validation_report
      - OutputReview.md
      - SupervisorApproval.md
      - no_secret_report
  rejected:
    directory: artifacts/default/rejected
    writer: supervisor
    requires:
      - failure_reason
  archive:
    directory: artifacts/default/archive
    writer: publisher
    requires:
      - superseded_artifact
profiles:
  api_test_design:
    final_outputs:
      - API_OperationInventory.md
      - API_TestDesign.md
      - API_TestDesign.generated.xlsx
      - OutputReview.md
      - SupervisorApproval.md
  api_testcase:
    final_outputs:
      - API_OperationInventory.md
      - API_TestDesign.md
      - API_TestDesign.generated.xlsx
      - TestCaseSource.md
      - Legacy19TestCase.generated.tsv
      - Legacy19TestCase.generated.xlsx
      - OutputReview.md
      - SupervisorApproval.md
  ui_test_design:
    final_outputs:
      - UI_TestDesign.md
      - UI_TestDesign.generated.xlsx
      - OutputReview.md
      - SupervisorApproval.md
  ui_testcase:
